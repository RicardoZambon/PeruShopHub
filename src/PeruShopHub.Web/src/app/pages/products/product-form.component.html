<!-- Header -->
<app-page-header
  [title]="isEditMode() ? 'Editar Produto: ' + productName() : 'Novo Produto'"
  backRoute="/produtos"
>
  @if (isEditMode()) {
    <div class="header-menu">
      <button class="btn-more" (click)="menuOpen.set(!menuOpen())" aria-label="Mais ações">
        <lucide-icon [img]="moreIcon" [size]="20"></lucide-icon>
      </button>
      @if (menuOpen()) {
        <div class="header-menu__backdrop" (click)="menuOpen.set(false)"></div>
        <div class="header-menu__dropdown">
          <button class="header-menu__item" (click)="menuOpen.set(false); toggleActive()">
            <lucide-icon [img]="isActive() ? powerOffIcon : powerIcon" [size]="16"></lucide-icon>
            {{ isActive() ? 'Desativar Produto' : 'Ativar Produto' }}
          </button>
          <div class="header-menu__divider"></div>
          <button class="header-menu__item header-menu__item--danger" (click)="menuOpen.set(false); deleteProduct()">
            <lucide-icon [img]="trashIcon" [size]="16"></lucide-icon>
            Excluir Produto
          </button>
        </div>
      }
    </div>
  }
</app-page-header>

  <!-- Two-panel layout -->
  <div class="two-panel-layout">
    <!-- Left panel: Form -->
    <div class="form-panel" [class.form-layout--saving]="loading()">
      <form [formGroup]="form" class="form-content">
        <app-tab-panels
          [tabs]="tabItems"
          [activeTab]="activeTab()"
          (activeTabChange)="setActiveTab($event)">

          <!-- TAB: Informações Básicas -->
          <ng-template appTabPanel="basicas">
            <div class="form-layout">
              <app-form-field label="SKU">
                <div class="sku-field-row">
                  <input
                    id="sku"
                    type="text"
                    formControlName="sku"
                    placeholder="Ex: TWS-PRO-001"
                    (input)="skuAutoGenerated.set(false)"
                  />
                  @if (form.get('categoria')?.value) {
                    <button type="button" class="sku-suggest-link" (click)="onSuggestSku()">
                      Sugerir
                    </button>
                  }
                </div>
              </app-form-field>

              <app-form-field
                label="Título do anúncio"
                [required]="true"
                [error]="titulo.touched && titulo.hasError('required') ? 'Título é obrigatório' : ''">
                <input
                  id="titulo"
                  type="text"
                  formControlName="titulo"
                  placeholder="Ex: Fone Bluetooth TWS Pro Max"
                  maxlength="60"
                  [class.invalid]="titulo.touched && titulo.invalid"
                />
                <div class="field-footer">
                  <span class="char-counter" [class.limit]="tituloLength() >= 55">
                    {{ tituloLength() }}/60
                  </span>
                </div>
              </app-form-field>

              <app-form-field
                label="Categoria"
                [required]="true"
                [error]="categoria.touched && categoria.hasError('required') ? 'Categoria é obrigatória' : ''">
                <app-tree-select
                  [categories]="categoryTree()"
                  [value]="form.get('categoria')?.value || null"
                  (valueChange)="onCategoryChange($event)"
                ></app-tree-select>
              </app-form-field>

              <app-form-field label="Descrição">
                <textarea
                  id="descricao"
                  formControlName="descricao"
                  placeholder="Descreva seu produto em detalhes..."
                  rows="8"
                ></textarea>
              </app-form-field>

              <app-form-field label="Fornecedor">
                <input
                  id="fornecedor"
                  type="text"
                  formControlName="fornecedor"
                  placeholder="Nome do fornecedor"
                />
              </app-form-field>
            </div>
          </ng-template>

          <!-- TAB: Preço e Custos -->
          <ng-template appTabPanel="preco">
            <div class="form-layout">
              <div class="fields-row">
                <app-form-field
                  label="Preço de venda"
                  [required]="true"
                  [error]="precoVenda.touched && precoVenda.hasError('required') ? 'Preço é obrigatório' : precoVenda.touched && precoVenda.hasError('min') ? 'Preço deve ser maior que zero' : ''">
                  <div class="input-prefix">
                    <span class="prefix">R$</span>
                    <input
                      id="precoVenda"
                      type="number"
                      formControlName="precoVenda"
                      placeholder="0,00"
                      step="0.01"
                      min="0"
                      [class.invalid]="precoVenda.touched && precoVenda.invalid"
                    />
                  </div>
                </app-form-field>

                <app-form-field label="Custo de aquisição">
                  <div class="input-prefix">
                    <span class="prefix">R$</span>
                    <input
                      id="custoAquisicao"
                      type="number"
                      formControlName="custoAquisicao"
                      placeholder="0,00"
                      step="0.01"
                      min="0"
                    />
                  </div>
                </app-form-field>
              </div>

              <!-- Margin Calculator -->
              @if (margemEstimada() !== null) {
                <div class="margin-calculator">
                  <span class="margin-label">Margem estimada:</span>
                  <span class="margin-value" [style.color]="getMargemColor()">
                    {{ margemEstimada()! | number:'1.1-1' }}%
                  </span>
                </div>
              }
            </div>
          </ng-template>

          <!-- TAB: Dimensões -->
          <ng-template appTabPanel="dimensoes">
            <div class="form-layout">
              <div class="fields-row fields-row--4">
                <app-form-field label="Peso (kg)">
                  <input
                    id="peso"
                    type="number"
                    formControlName="peso"
                    placeholder="0.00"
                    step="0.01"
                    min="0"
                  />
                </app-form-field>
                <app-form-field label="Altura (cm)">
                  <input
                    id="altura"
                    type="number"
                    formControlName="altura"
                    placeholder="0"
                    min="1"
                  />
                </app-form-field>
                <app-form-field label="Largura (cm)">
                  <input
                    id="largura"
                    type="number"
                    formControlName="largura"
                    placeholder="0"
                    min="1"
                  />
                </app-form-field>
                <app-form-field label="Comprimento (cm)">
                  <input
                    id="comprimento"
                    type="number"
                    formControlName="comprimento"
                    placeholder="0"
                    min="1"
                  />
                </app-form-field>
              </div>
            </div>
          </ng-template>

          <!-- TAB: Variações -->
          <ng-template appTabPanel="variacoes">
            <div class="form-layout">
              <app-variant-manager
                [productId]="productId()"
                [categoryId]="form.get('categoria')?.value"
                [productSku]="form.get('sku')?.value || 'PROD'"
              ></app-variant-manager>
            </div>
          </ng-template>
        </app-tab-panels>
      </form>
    </div>

    <!-- Right panel: Media Gallery -->
    <div class="gallery-panel">
      <app-media-gallery
        [productId]="productId()"
        [images]="galleryImages()"
        [videoUrl]="galleryVideoUrl()"
        (imagesChange)="onGalleryImagesChange($event)"
        (videoUrlChange)="onGalleryVideoChange($event)"
      ></app-media-gallery>
    </div>
  </div>

  <!-- Sticky Bottom Bar -->
  <div class="bottom-bar">
    <div class="bottom-bar-actions">
      @if (isEditMode()) {
        <app-button variant="ghost" [disabled]="loading()" (click)="onCancel()">
          Cancelar
        </app-button>
      }
      <app-button variant="accent" [icon]="saveIcon" [loading]="loading()" [disabled]="loading()" (click)="onSave()">
        {{ loading() ? 'Salvando...' : 'Salvar' }}
      </app-button>
    </div>
  </div>
