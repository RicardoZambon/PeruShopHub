<app-dialog [title]="dialogTitle" [open]="true" (closed)="close()">
  <form body class="form-layout" [class.form-layout--saving]="saving()" [formGroup]="form" (ngSubmit)="onSubmit()">
    <!-- Icon + Name row -->
    <div class="field-row--icon-name">
      <div class="field-row--icon-name__icon">
        <label>Ícone</label>
        <app-icon-picker
          [value]="selectedIcon()"
          (valueChange)="onIconChange($event)"
        ></app-icon-picker>
      </div>
      <div class="field-row--icon-name__name">
        <app-form-field
          label="Nome"
          [error]="serverErrors()['name'] || (form.get('name')!.touched && form.get('name')!.hasError('required') ? 'Nome é obrigatório' : '')"
          [required]="true">
          <input
            id="category-name"
            type="text"
            formControlName="name"
            placeholder="Nome da categoria"
            maxlength="100"
            (input)="onNameInput(); serverErrors.set({})"
          />
        </app-form-field>
      </div>
    </div>

    <app-form-field
      label="Slug"
      hint="Identificador na URL. Gerado automaticamente a partir do nome."
      [error]="serverErrors()['slug'] || (form.get('slug')!.touched && form.get('slug')!.hasError('required') ? 'Slug é obrigatório' : '')"
      [required]="true">
      <input
        id="category-slug"
        type="text"
        formControlName="slug"
        placeholder="slug-da-categoria"
        maxlength="120"
        (input)="onSlugInput(); serverErrors.set({})"
      />
    </app-form-field>

    <app-form-field label="Categoria Pai">
      <div class="parent-dropdown">
        <button
          type="button"
          class="parent-dropdown__trigger"
          (click)="toggleParentDropdown()"
        >
          <span>{{ selectedParentName() }}</span>
          <span class="parent-dropdown__chevron">&#9662;</span>
        </button>

        @if (parentDropdownOpen()) {
          <div class="parent-dropdown__list">
            <button
              type="button"
              class="parent-dropdown__item"
              [class.parent-dropdown__item--selected]="!form.get('parentId')!.value"
              (click)="selectParent(null)"
            >
              Nenhuma (raiz)
            </button>

            @for (option of flatParentOptions(); track option.id) {
              <button
                type="button"
                class="parent-dropdown__item"
                [class.parent-dropdown__item--selected]="form.get('parentId')!.value === option.id"
                (click)="selectParent(option.id)"
              >
                {{ getIndent(option.depth) }}{{ option.name }}
              </button>
            }
          </div>
        }
      </div>
    </app-form-field>

    <app-toggle-switch label="Ativo" formControlName="isActive"></app-toggle-switch>
  </form>

  <ng-container footer>
    <app-form-actions
      (cancel)="close()"
      (save)="onSubmit()"
      [saving]="saving()"
      [disabled]="form.invalid">
    </app-form-actions>
  </ng-container>
</app-dialog>
