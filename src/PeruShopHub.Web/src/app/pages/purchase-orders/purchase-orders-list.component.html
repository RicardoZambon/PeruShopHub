<!-- Header -->
<app-page-header
  title="Compras"
  actionLabel="Nova Compra"
  [actionIcon]="plusIcon"
  (action)="onNewOrder()">
</app-page-header>

<!-- Action Bar -->
<div class="action-bar">
  <app-search-input
    placeholder="Buscar por fornecedor..."
    [value]="searchQuery()"
    (valueChange)="onSearchChange($event)">
  </app-search-input>
  <app-select-dropdown
    [options]="statusOptions"
    [value]="statusFilter()"
    (valueChange)="onStatusFilterChange($event)">
  </app-select-dropdown>
</div>

<!-- Data Grid -->
<app-data-grid
  #grid
  [columns]="gridColumns"
  [data]="gridData()"
  [loading]="loading()"
  [hasMore]="hasMore()"
  [pageSize]="pageSize()"
  [totalCount]="totalCount()"
  entityName="pedidos"
  emptyTitle="Nenhuma compra encontrada"
  emptyDescription="Tente ajustar os filtros de busca ou crie uma nova ordem de compra."
  ariaLabel="Lista de ordens de compra"
  (sortChange)="onSort($event)"
  (loadMore)="onLoadMore()"
  (rowClick)="onRowClick($event)"
>
  <!-- Supplier cell -->
  <ng-template appGridCell="supplier" let-row let-value="value">
    <span class="po-list__name">{{ value || 'Sem fornecedor' }}</span>
  </ng-template>

  <!-- Status cell (badge) -->
  <ng-template appGridCell="status" let-row let-value="value">
    <app-badge [label]="value" [variant]="getStatusVariant(value)" />
  </ng-template>

  <!-- Total cell (currency mono) -->
  <ng-template appGridCell="total" let-row let-value="value">
    <span class="po-list__mono">{{ value | brlCurrency }}</span>
  </ng-template>

  <!-- Created date cell -->
  <ng-template appGridCell="createdAt" let-row let-value="value">
    {{ formatDate(value) }}
  </ng-template>

  <!-- Received date cell -->
  <ng-template appGridCell="receivedAt" let-row let-value="value">
    {{ formatDate(value) }}
  </ng-template>

  <!-- Mobile card template -->
  <ng-template appGridCard let-row>
    <div class="po-list__card-header">
      <div class="po-list__card-title">
        <span class="po-list__card-name">{{ row.supplier || 'Sem fornecedor' }}</span>
        <span class="po-list__card-date">{{ formatDate(row.createdAt) }}</span>
      </div>
      <app-badge [label]="row.status" [variant]="getStatusVariant(row.status)" />
    </div>
    <div class="po-list__card-body">
      <div class="po-list__card-field">
        <span class="po-list__card-label">Itens</span>
        <span class="po-list__card-value">{{ row.itemCount }}</span>
      </div>
      <div class="po-list__card-field">
        <span class="po-list__card-label">Total</span>
        <span class="po-list__card-value po-list__mono">{{ row.total | brlCurrency }}</span>
      </div>
      <div class="po-list__card-field">
        <span class="po-list__card-label">Recebido</span>
        <span class="po-list__card-value">{{ formatDate(row.receivedAt) }}</span>
      </div>
    </div>
  </ng-template>
</app-data-grid>
