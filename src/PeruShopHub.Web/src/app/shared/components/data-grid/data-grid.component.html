<div class="data-grid">
  <div class="data-grid__scroll-wrapper">
    <!-- Desktop table view -->
    <table class="data-grid__table data-grid__desktop-only">
      <thead>
        <tr>
          <th
            *ngFor="let col of columns"
            [style.text-align]="col.align || 'left'"
            [style.width]="col.width || null"
            [class]="col.headerClass || ''"
            [class.data-grid__th--sortable]="col.sortable"
            [class.data-grid__th--active]="col.sortable && getSortDirection(col.key)"
            (click)="onSortClick(col)"
          >
            <span class="data-grid__header-content">
              <ng-container *ngIf="getHeaderTemplate(col.key) as headerTmpl; else defaultHeader">
                <ng-container *ngTemplateOutlet="headerTmpl"></ng-container>
              </ng-container>
              <ng-template #defaultHeader>{{ col.label }}</ng-template>

              <span *ngIf="col.sortable" class="data-grid__sort-icon">
                <svg *ngIf="!getSortDirection(col.key)" width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
                  <path d="M7 2.5L10 6H4L7 2.5Z" opacity="0.4"/>
                  <path d="M7 11.5L4 8H10L7 11.5Z" opacity="0.4"/>
                </svg>
                <svg *ngIf="getSortDirection(col.key) === 'asc'" width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
                  <path d="M7 2.5L10 6H4L7 2.5Z"/>
                  <path d="M7 11.5L4 8H10L7 11.5Z" opacity="0.2"/>
                </svg>
                <svg *ngIf="getSortDirection(col.key) === 'desc'" width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
                  <path d="M7 2.5L10 6H4L7 2.5Z" opacity="0.2"/>
                  <path d="M7 11.5L4 8H10L7 11.5Z"/>
                </svg>
              </span>
            </span>
          </th>
        </tr>
      </thead>
      <tbody>
        <!-- Skeleton rows for initial loading -->
        <ng-container *ngIf="showSkeleton">
          <tr *ngFor="let i of skeletonRowsArray" class="data-grid__skeleton-row">
            <td
              *ngFor="let col of columns"
              [style.text-align]="col.align || 'left'"
              [style.width]="col.width || null"
            >
              <app-skeleton
                type="text"
                [width]="col.align === 'right' ? '60%' : '80%'"
                height="16px"
                [style.margin-left]="col.align === 'right' ? 'auto' : null"
              ></app-skeleton>
            </td>
          </tr>
        </ng-container>

        <!-- Data rows -->
        <ng-container *ngIf="!showSkeleton">
          <tr
            *ngFor="let row of data"
            [class.data-grid__row--clickable]="hasRowClick"
            (click)="onRowClick($event, row)"
          >
            <td
              *ngFor="let col of columns"
              [style.text-align]="col.align || 'left'"
              [class]="col.cellClass || ''"
            >
              <ng-container *ngIf="getCellTemplate(col.key) as tmpl; else defaultCell">
                <ng-container *ngTemplateOutlet="tmpl; context: { $implicit: row, value: row[col.key] }"></ng-container>
              </ng-container>
              <ng-template #defaultCell>{{ row[col.key] }}</ng-template>
            </td>
          </tr>
        </ng-container>
      </tbody>
    </table>

    <!-- Mobile card view -->
    <div class="data-grid__cards data-grid__mobile-only">
      <!-- Skeleton cards for initial loading on mobile -->
      <ng-container *ngIf="showSkeleton">
        <div *ngFor="let i of skeletonRowsArray" class="data-grid__card data-grid__card--skeleton">
          <div *ngFor="let col of columns" class="data-grid__card-field">
            <app-skeleton type="text" width="30%" height="12px"></app-skeleton>
            <app-skeleton type="text" width="60%" height="14px"></app-skeleton>
          </div>
        </div>
      </ng-container>

      <!-- Data cards -->
      <ng-container *ngIf="!showSkeleton">
        <ng-container *ngFor="let row of data">
          <!-- Custom card template -->
          <ng-container *ngIf="cardTemplate as customCard; else defaultCard">
            <div class="data-grid__card" [class.data-grid__card--clickable]="hasRowClick" (click)="onRowClick($event, row)">
              <ng-container *ngTemplateOutlet="customCard; context: { $implicit: row }"></ng-container>
            </div>
          </ng-container>
          <!-- Default card: label-value pairs from columns -->
          <ng-template #defaultCard>
            <div class="data-grid__card" [class.data-grid__card--clickable]="hasRowClick" (click)="onRowClick($event, row)">
              <div *ngFor="let col of columns" class="data-grid__card-field">
                <span class="data-grid__card-label">{{ col.label }}</span>
                <span class="data-grid__card-value" [style.text-align]="col.align || 'left'">
                  <ng-container *ngIf="getCellTemplate(col.key) as tmpl; else defaultCardCell">
                    <ng-container *ngTemplateOutlet="tmpl; context: { $implicit: row, value: row[col.key] }"></ng-container>
                  </ng-container>
                  <ng-template #defaultCardCell>{{ row[col.key] }}</ng-template>
                </span>
              </div>
            </div>
          </ng-template>
        </ng-container>
      </ng-container>
    </div>

    <!-- Empty state -->
    <div *ngIf="showEmpty" class="data-grid__empty">
      <ng-container *ngIf="emptyTemplate as customEmpty; else defaultEmpty">
        <ng-container *ngTemplateOutlet="customEmpty"></ng-container>
      </ng-container>
      <ng-template #defaultEmpty>
        <div class="data-grid__empty-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect x="8" y="12" width="32" height="24" rx="3" stroke="currentColor" stroke-width="2"/>
            <line x1="8" y1="20" x2="40" y2="20" stroke="currentColor" stroke-width="2"/>
            <line x1="20" y1="20" x2="20" y2="36" stroke="currentColor" stroke-width="2"/>
          </svg>
        </div>
        <h3 class="data-grid__empty-title">{{ emptyTitle }}</h3>
        <p *ngIf="emptyDescription" class="data-grid__empty-description">{{ emptyDescription }}</p>
      </ng-template>
    </div>

    <!-- Loading spinner for infinite scroll -->
    <div *ngIf="loading && data.length > 0" class="data-grid__loading-more">
      <div class="data-grid__spinner"></div>
    </div>

    <!-- Sentinel element for IntersectionObserver -->
    <div #sentinel class="data-grid__sentinel"></div>
  </div>
</div>
