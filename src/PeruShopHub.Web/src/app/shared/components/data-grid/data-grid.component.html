<div class="data-grid">
  <div class="data-grid__scroll-wrapper">
    <table class="data-grid__table">
      <thead>
        <tr>
          <th
            *ngFor="let col of columns"
            [style.text-align]="col.align || 'left'"
            [style.width]="col.width || null"
            [class]="col.headerClass || ''"
          >
            <ng-container *ngIf="getHeaderTemplate(col.key) as headerTmpl; else defaultHeader">
              <ng-container *ngTemplateOutlet="headerTmpl"></ng-container>
            </ng-container>
            <ng-template #defaultHeader>{{ col.label }}</ng-template>
          </th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of data">
          <td
            *ngFor="let col of columns"
            [style.text-align]="col.align || 'left'"
            [class]="col.cellClass || ''"
          >
            <ng-container *ngIf="getCellTemplate(col.key) as tmpl; else defaultCell">
              <ng-container *ngTemplateOutlet="tmpl; context: { $implicit: row, value: row[col.key] }"></ng-container>
            </ng-container>
            <ng-template #defaultCell>{{ row[col.key] }}</ng-template>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
