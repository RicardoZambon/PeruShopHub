<div class="palette-backdrop"
     (click)="onBackdropClick($event)">
  <div class="palette">
    <!-- Search input -->
    <div class="palette__input-wrapper">
      <lucide-icon [img]="searchIcon" [size]="20" class="palette__input-icon" />
      <input
        #searchInput
        type="text"
        class="palette__input"
        placeholder="Buscar pedidos, produtos, clientes..."
        [value]="query()"
        (input)="onInput($event)"
        autocomplete="off"
      />
      <button class="palette__close" (click)="closed.emit()" aria-label="Fechar">
        <kbd class="palette__kbd">Esc</kbd>
      </button>
    </div>

    <!-- Results -->
    <div class="palette__results">
      @for (group of groups(); track group.type) {
        <div class="palette__group">
          <div class="palette__group-header">
            <lucide-icon [img]="group.icon" [size]="14" />
            <span>{{ group.label }}</span>
          </div>
          @for (result of group.results; track result.id) {
            <button
              class="palette__item"
              [class.palette__item--active]="isActive(result)"
              (click)="navigateToResult(result)"
              (mouseenter)="activeIndex.set(flatResults().indexOf(result))"
            >
              <div class="palette__item-text">
                <span class="palette__item-primary">{{ result.primary }}</span>
                <span class="palette__item-secondary">{{ result.secondary }}</span>
              </div>
            </button>
          }
        </div>
      }

      @if (noResults()) {
        <div class="palette__empty">
          Nenhum resultado para "{{ query() }}"
        </div>
      }

      @if (!hasQuery()) {
        <div class="palette__hint">
          Digite para buscar pedidos, produtos ou clientes
        </div>
      }
    </div>

    <!-- Footer -->
    <div class="palette__footer">
      <span><kbd>&uarr;</kbd><kbd>&darr;</kbd> navegar</span>
      <span><kbd>Enter</kbd> abrir</span>
      <span><kbd>Esc</kbd> fechar</span>
    </div>
  </div>
</div>
