<div class="page-header">
  @if (showBack) {
    @if (backRoute) {
      <a class="page-header__back" [routerLink]="backRoute">
        <lucide-icon [img]="arrowLeftIcon" [size]="20"></lucide-icon>
      </a>
    } @else {
      <button class="page-header__back" (click)="backClick.emit()">
        <lucide-icon [img]="arrowLeftIcon" [size]="20"></lucide-icon>
      </button>
    }
  }
  <div class="page-header__text">
    <h1 class="page-header__title">{{ title }}</h1>
    @if (subtitle) {
      <span class="page-header__subtitle">{{ subtitle }}</span>
    }
  </div>
  <ng-content></ng-content>
  @if (actionLabel) {
    <div class="page-header__action">
      <app-button
        variant="accent"
        [icon]="actionIcon"
        (click)="action.emit()"
      >
        {{ actionLabel }}
      </app-button>
    </div>
  }
</div>
