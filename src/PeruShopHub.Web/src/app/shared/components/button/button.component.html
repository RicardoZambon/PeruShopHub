<button
  [type]="type"
  [disabled]="isDisabled"
  [attr.aria-label]="ariaLabel || null"
  class="btn"
  [ngClass]="[
    'btn--' + variant,
    'btn--' + size,
    iconOnly ? 'btn--icon-only' : '',
    loading ? 'btn--loading' : ''
  ]"
>
  @if (loading) {
    <span class="btn__spinner"></span>
  }
  @if (icon && !loading) {
    <lucide-icon
      [img]="icon"
      [size]="variant === 'icon' || size === 'sm' ? 16 : 18"
    ></lucide-icon>
  }
  @if (!iconOnly) {
    <ng-content></ng-content>
  }
</button>
