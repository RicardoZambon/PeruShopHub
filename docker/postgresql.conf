# PeruShopHub — PostgreSQL Performance & Monitoring Configuration
# Mounted into the PostgreSQL container to enable slow query logging
# and basic performance tuning.

# --- Slow Query Logging ---
# Log queries taking longer than 1 second
log_min_duration_statement = 1000

# Log format: include timestamp, PID, and duration
log_line_prefix = '%t [%p] %u@%d '
log_statement = 'none'
log_duration = off

# Log lock waits longer than 1 second
log_lock_waits = on
deadlock_timeout = 1s

# Log temporary file usage (helps identify queries needing more work_mem)
log_temp_files = 0

# Log autovacuum activity longer than 0ms (all autovacuum)
log_autovacuum_min_duration = 0

# Log checkpoints
log_checkpoints = on
log_connections = on
log_disconnections = on

# --- Basic Performance ---
# Shared buffers: 25% of available RAM (256MB for typical VPS with 1GB)
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 4MB
maintenance_work_mem = 64MB

# WAL settings for better write performance
wal_buffers = 16MB
checkpoint_completion_target = 0.9
