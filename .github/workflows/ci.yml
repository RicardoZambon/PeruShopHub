name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ['*']

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore PeruShopHub.sln

      - name: Build
        run: dotnet build PeruShopHub.sln --no-restore --configuration Release

      - name: Unit Tests
        run: dotnet test tests/PeruShopHub.UnitTests --no-build --configuration Release --verbosity normal

      - name: Integration Tests
        run: dotnet test tests/PeruShopHub.IntegrationTests --no-build --configuration Release --verbosity normal

  frontend:
    name: Frontend — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/PeruShopHub.Web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/PeruShopHub.Web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx ng build --configuration=production

      - name: Test
        run: npx vitest run
