services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: perushophub
      POSTGRES_USER: perushophub
      POSTGRES_PASSWORD: perushophub_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    ports:
      - "5432:5432"
    networks:
      - perushophub-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perushophub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass redis_secret
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - perushophub-net

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=perushophub;Username=perushophub;Password=perushophub_secret"
      ConnectionStrings__Redis: "redis:6379,password=redis_secret,abortConnect=false"
      Jwt__Secret: "docker-compose-jwt-secret-minimum-32-characters-long!"
      Jwt__Issuer: "PeruShopHub"
      Jwt__Audience: "PeruShopHub"
    volumes:
      - uploads:/app/wwwroot/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - perushophub-net

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=perushophub;Username=perushophub;Password=perushophub_secret"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - perushophub-net

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - perushophub-net

  backup:
    build:
      context: .
      dockerfile: docker/Dockerfile.backup
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGDATABASE: perushophub
      PGUSER: perushophub
      PGPASSWORD: perushophub_secret
      BACKUP_DIR: /backups
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: redis_secret
      HEALTH_URL: http://api:5000/health
      DISK_THRESHOLD_PERCENT: "80"
      REDIS_THRESHOLD_PERCENT: "80"
      # OFFSITE_BUCKET: s3://perushophub-backups
      # OFFSITE_ENDPOINT: https://s3.us-west-001.backblazeb2.com
      # AWS_ACCESS_KEY_ID: ""
      # AWS_SECRET_ACCESS_KEY: ""
      # ALERT_WEBHOOK: https://hooks.slack.com/services/...
    volumes:
      - backup_data:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - perushophub-net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads:
  backup_data:

networks:
  perushophub-net:
    driver: bridge
